name: Keystead server CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: keystead-server
      - uses: actions/checkout@v4
        with:
          repository: MidCoard/keystead
          path: keystead
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew spotlessCheck test --no-daemon --rerun-tasks
        working-directory: keystead-server
      - run: git diff --check
        working-directory: keystead-server
