services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: keystead
      POSTGRES_USER: keystead
      POSTGRES_PASSWORD: keystead
    ports:
      - "5432:5432"
    volumes:
      - keystead-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystead -d keystead"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  keystead-postgres:
